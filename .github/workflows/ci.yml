name: Static quality checks

on:
  push:
  pull_request:

jobs:
  static-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm --prefix backend ci
      - run: npm run quality:static

# Full cryptographic tests require locally generated CA/TSA/OCSP material.
# PKCS#11/SoftHSM E2E additionally requires a prepared Windows host.
